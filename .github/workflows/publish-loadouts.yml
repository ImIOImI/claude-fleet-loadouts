name: Publish loadouts

on:
  push:
    branches: [main]
    paths:
      - 'loadouts/**'
      - 'scripts/**'
      - '.github/workflows/publish-loadouts.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase repository owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate (dry run)
        env:
          REGISTRY: ghcr.io
          OWNER: ${{ steps.owner.outputs.value }}
        run: ./scripts/publish-all.sh --dry-run

      - name: Package and push loadouts
        env:
          REGISTRY: ghcr.io
          OWNER: ${{ steps.owner.outputs.value }}
        run: ./scripts/publish-all.sh
